name: visionaid
description: VisionAid - AI Accessibility Companion for Blind and Low Vision users
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Camera & Media
  camera: ^0.10.5+9
  image: ^4.1.7

  # AI & ML
  google_mlkit_text_recognition: ^0.11.0
  http: ^1.2.0
  dio: ^5.4.0

  # Text-to-Speech
  flutter_tts: ^3.8.5

  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI & Accessibility
  google_fonts: ^6.1.0
  vibration: ^1.8.4

  # Utilities
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

